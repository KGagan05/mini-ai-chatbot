<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>
</head>
<body>

<h1>🤖 AI Chatbot</h1>

<form action="/chat" method="post">
    <input type="text" name="message" placeholder="Ask something..." required>
    <button type="submit">Send</button>
</form>

{% if message %}
    <p><b>You:</b> {{message}}</p>
    <p><b>Bot:</b> {{response}}</p>
{% endif %}

</body>
</html>
